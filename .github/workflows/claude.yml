name: Claude Code

on:
  issue_comment:
    types: [created]

jobs:
  claude:
    if: |
      contains(github.event.comment.body, '@claude') &&
      github.event.issue.pull_request == null
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    env:
      ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_FOUNDRY_RESOURCE }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          trigger_phrase: "@claude"
          anthropic_api_key: ${{ secrets.ANTHROPIC_FOUNDRY_API_KEY }}
          github_token: ${{ github.token }}
          claude_args: "--dangerously-skip-permissions"
          prompt: |
            Analyze the issue context and implement the requested changes.
            Create a pull request with your implementation that addresses the issue.
            Reference the issue number in the PR description.
