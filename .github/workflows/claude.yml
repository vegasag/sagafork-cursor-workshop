name: Claude Code (API Key)

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: "Prompt for Claude"
        required: false
        default: "Say hello and confirm you are working."
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    concurrency:
      group: claude-apikey-${{ github.event.issue.number || github.event.pull_request.number || github.run_id }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    environment: jira-github-workflow-p
    env:
      # Foundry keys are not sk-ant-*; do not use anthropic_api_key without use_foundry.
      ANTHROPIC_FOUNDRY_API_KEY: ${{ secrets.ANTHROPIC_FOUNDRY_API_KEY }}
      # Resource host only, e.g. https://YOUR-RESOURCE.services.ai.azure.com (no /anthropic path)
      ANTHROPIC_FOUNDRY_BASE_URL: ${{ vars.ANTHROPIC_BASE_URL }}
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          use_foundry: "true"
          claude_args: |
            --model claude-sonnet-4-6
            --dangerously-skip-permissions
          prompt: ${{ github.event.inputs.prompt }}