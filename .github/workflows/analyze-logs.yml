name: Analyze Logs and Create Issues

on:
  schedule:
    - cron: "0 8 * * *" # Daily at 08:00 UTC
  workflow_dispatch:

jobs:
  analyze-logs:
    runs-on: ubuntu-latest
    environment: jira-github-workflow-p
    permissions:
      contents: read
      issues: write
      actions: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Azure login
        run: |
          az login --service-principal \
            --username "${{ secrets.AZURE_CLIENT_ID }}" \
            --password "${{ secrets.AZURE_CLIENT_SECRET }}" \
            --tenant "${{ secrets.AZURE_TENANT_ID }}"
          az account set --subscription "${{ secrets.AZURE_SUBSCRIPTION_ID }}"

      - name: Query Application Insights
        run: |
          mkdir -p /tmp/logs

          echo "=== Application Insights: Exceptions (last 24h) ===" > /tmp/logs/appinsights.log
          az monitor app-insights query \
            --app ai-snkm-p \
            --resource-group rg-snkm-shared-p \
            --analytics-query "exceptions | where timestamp > ago(24h) | summarize count() by type, outerMessage, cloud_RoleName | order by count_ desc | limit 50" \
            --output json >> /tmp/logs/appinsights.log 2>&1 || true

          echo "" >> /tmp/logs/appinsights.log
          echo "=== Application Insights: Failed Requests (last 24h) ===" >> /tmp/logs/appinsights.log
          az monitor app-insights query \
            --app ai-snkm-p \
            --resource-group rg-snkm-shared-p \
            --analytics-query "requests | where timestamp > ago(24h) and success == false | summarize count() by name, resultCode, cloud_RoleName | order by count_ desc | limit 50" \
            --output json >> /tmp/logs/appinsights.log 2>&1 || true

          echo "" >> /tmp/logs/appinsights.log
          echo "=== Application Insights: Critical Traces (last 24h) ===" >> /tmp/logs/appinsights.log
          az monitor app-insights query \
            --app ai-snkm-p \
            --resource-group rg-snkm-shared-p \
            --analytics-query "traces | where timestamp > ago(24h) and severityLevel >= 3 | summarize count() by message, cloud_RoleName | order by count_ desc | limit 50" \
            --output json >> /tmp/logs/appinsights.log 2>&1 || true

          cat /tmp/logs/appinsights.log

      - name: Analyze logs with Claude and create issues
        uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_FOUNDRY_RESOURCE: ${{ vars.ANTHROPIC_FOUNDRY_RESOURCE }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          use_foundry: "true"
          claude_args: "--model claude-sonnet-4-6"
          show_full_output: "true"
          prompt: |
            You are a log analysis assistant. Analyze Application Insights telemetry and create GitHub issues for any real problems found.

            Read the log file at /tmp/logs/appinsights.log.

            It contains three sections:
            - Exceptions: unhandled errors grouped by type and message
            - Failed Requests: HTTP failures grouped by endpoint and status code
            - Critical Traces: severity level 3+ log entries

            For each distinct problem or pattern you find:
            1. Check for existing issues: gh issue list --repo ${{ github.repository }} --state open --label "log-analysis"
            2. If no duplicate exists, create a GitHub issue:
               gh issue create \
                 --repo ${{ github.repository }} \
                 --label "log-analysis" \
                 --title "<concise title>" \
                 --body "<description with: what was found, affected service/role, error details, count/frequency, and suggested fix>"

            Rules:
            - Only create issues for real problems (errors, exceptions, failed requests)
            - Group related failures into one issue
            - Skip if the query returned no data or only empty results
            - If nothing notable found, output "No issues found — logs look healthy."
