name: Analyze Logs and Create Issues

on:
  schedule:
    - cron: "0 8 * * *" # Daily at 08:00 UTC
  workflow_dispatch:

jobs:
  analyze-logs:
    runs-on: ubuntu-latest
    environment: jira-github-workflow-p
    permissions:
      contents: read
      issues: write
      actions: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Azure login
        run: |
          az login --service-principal \
            --username "${{ secrets.AZURE_CLIENT_ID }}" \
            --password "${{ secrets.AZURE_CLIENT_SECRET }}" \
            --tenant "${{ secrets.AZURE_TENANT_ID }}"
          az account set --subscription "${{ secrets.AZURE_SUBSCRIPTION_ID }}"

      - name: Debug - test Application Insights query
        run: |
          echo "=== Testing exceptions query ==="
          az monitor app-insights query \
            --app ai-snkm-p \
            --resource-group rg-snkm-shared-p \
            --analytics-query "exceptions | where timestamp > ago(7d) | take 5" \
            --output json
          echo "=== Testing requests query ==="
          az monitor app-insights query \
            --app ai-snkm-p \
            --resource-group rg-snkm-shared-p \
            --analytics-query "requests | where timestamp > ago(7d) | take 5" \
            --output json

      - name: Analyze logs with Claude and create issues
        uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_FOUNDRY_RESOURCE: ${{ vars.ANTHROPIC_FOUNDRY_RESOURCE }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          use_foundry: "true"
          claude_args: "--model claude-sonnet-4-6"
          show_full_output: "true"
          prompt: |
            You are a log analysis assistant with access to Azure CLI and GitHub CLI.

            The Application Insights resource is:
            - App: ai-snkm-p
            - Resource group: rg-snkm-shared-p

            You are already logged in to Azure. Use the az CLI to query Application Insights
            and investigate the health of the application. Decide yourself what queries are
            most relevant — for example: exceptions, failed requests, slow dependencies,
            critical traces, availability results, or any anomalies over the last 7 days.

            Use this command pattern to run KQL queries:
            az monitor app-insights query \
              --app ai-snkm-p \
              --resource-group rg-snkm-shared-p \
              --analytics-query "<your KQL query>" \
              --output json

            After investigating, for each distinct problem you find:
            1. Check for duplicates: gh issue list --repo ${{ github.repository }} --state open --label "log-analysis"
            2. If no duplicate exists, create a GitHub issue:
               gh issue create \
                 --repo ${{ github.repository }} \
                 --label "log-analysis" \
                 --title "<concise title>" \
                 --body "<description with: what was found, affected service, error details, frequency, and suggested fix>"

            Rules:
            - Only create issues for real problems
            - Group related failures into one issue
            - If nothing notable found, say "No issues found — logs look healthy."
