# Schedule (weekdays) or manual: query Log Analytics, then Claude opens an issue.
# anthropics/claude-code-action does not support the `push` event (use workflow_dispatch to test).
# Docs: https://code.claude.com/docs/en/github-actions#custom-automation-with-prompts
#
# GitHub Secrets: AZURE_CLIENT_ID, AZURE_CLIENT_SECRET, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID
#   Passed as one JSON object in `creds` (clientSecret = client secret). azure/login@v2 has no separate client-secret field.
#   ANTHROPIC_FOUNDRY_API_KEY, ANTHROPIC_BASE_URL
#
# Optional repository Variable: LOG_ANALYTICS_WORKSPACE_ID (default: workshop workspace GUID)

name: Log Analytics exceptions (Claude)

on:
  schedule:
    - cron: "0 7 * * 1-5"
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write
  id-token: write
  actions: read

jobs:
  analyze-exceptions:
    runs-on: ubuntu-latest
    env:
      LAW_WORKSPACE: ${{ vars.LOG_ANALYTICS_WORKSPACE_ID || 'a53c2ee0-9900-4756-b9c1-ab1b96a28d87' }}
      ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Azure login (client secret in creds JSON)
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'

      - name: Query exceptions (last 24h, workspace ID)
        run: |
          set -euo pipefail
          OUT="${{ github.workspace }}/log-analytics-exceptions.json"
          WS="$LAW_WORKSPACE"
          # Workspace-based / App Insights: AppExceptions + TimeGenerated. Classic AI: exceptions + timestamp.
          Q_APP='AppExceptions | where TimeGenerated > ago(24h) | summarize Count=count(), LatestOccurrence=max(TimeGenerated), EarliestOccurrence=min(TimeGenerated) by ProblemId, Type, OuterMessage | top 2 by Count desc'
          Q_LEGACY='exceptions | where timestamp > ago(24h) | summarize Count=count(), LatestOccurrence=max(timestamp), EarliestOccurrence=min(timestamp) by problemId, type, outerMessage | top 2 by Count desc'
          if az monitor log-analytics query --workspace "$WS" --analytics-query "$Q_APP" --output json > "$OUT" 2>/tmp/la_query_err.log; then
            echo "Query used table: AppExceptions"
          else
            echo "AppExceptions failed (see log); trying exceptions table..."
            cat /tmp/la_query_err.log
            az monitor log-analytics query --workspace "$WS" --analytics-query "$Q_LEGACY" --output json > "$OUT"
          fi
          echo "Rows file size: $(wc -c < "$OUT") bytes"

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          github_token: ${{ github.token }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_FOUNDRY_API_KEY }}
          claude_args: "--dangerously-skip-permissions --model claude-sonnet-4-6"
          prompt: |
            You are helping on-call engineers with Azure Monitor / Log Analytics data.

            Read `log-analytics-exceptions.json` at the repository root. It is JSON from a Kusto query (typically an array of rows; empty array means no matching rows).

            If there are no rows (empty array), open **one** GitHub issue titled `Log Analytics — no exceptions (24h)` and state that the exception summary query returned no rows (AppExceptions or legacy exceptions table). Mention the query window is the last 24 hours.

            If there are rows:
            1. Summarize the most important exception patterns and likely user impact.
            2. For each major pattern, give probable causes and concrete remediation steps (config, code, infra).
            3. Open **one** GitHub issue with title `Log Analytics exceptions — analysis` and today's UTC date in the title, body in markdown, no raw credentials.

            Do not commit `log-analytics-exceptions.json` to git.
